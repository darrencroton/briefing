[paths]
# Set this to the root of the Obsidian vault briefing should write into.
vault_root = "~/Library/Mobile Documents/iCloud~md~obsidian/Documents/Vault"
meeting_notes_dir = "Internal/Meetings"
log_dir = "logs"
state_dir = "state"
prompt_dir = "user_config/prompts"
template_dir = "user_config/templates"
series_dir = "user_config/series"
debug_dir = "tmp"
env_file = "~/.env.briefing"

[meeting_intelligence]
# Session files live here, including manifests, transcripts, completion files, and raw audio.
sessions_root = "sessions"
noted_command = "noted"

# Start recording before the calendar start time; valid range is 60-180 seconds.
pre_roll_seconds = 90
# Move raw audio for completed sessions to macOS Trash after this many days.
raw_audio_retention_days = 7
watch_poll_seconds = 30
watch_lookahead_minutes = 180
reschedule_tolerance_seconds = 300

# Use location_type routing only when multiple Macs may see the same calendar.
# It gates both pre-meeting briefing generation and scheduled recording.
# default_location_type is the fallback target location when notes and series omit it.
# local_location_type overrides host-name detection for this Mac when set.
# default_location_type = "office"
# local_location_type = "office"

# These become manifest defaults when calendar notes and series YAML omit a field.
default_host_name = "Meeting host"
default_mode = "in_person"
default_language = "en-AU"
default_asr_backend = "whisperkit"
default_diarization_enabled = true

# One-off noted config events use paths.meeting_notes_dir unless this is set.
# one_off_note_dir = "~/Notes/Meetings"

# These defaults control noted's calendar-driven recording and end-of-meeting behaviour.
auto_start = true
auto_stop = true
default_extension_minutes = 10
max_single_extension_minutes = 15
pre_end_prompt_minutes = 5
no_interaction_grace_minutes = 5

# Uncomment this table when sharing one settings file across Macs.
# [meeting_intelligence.location_type_by_host]
# "Office-Mac" = "office"
# "Home-Mac" = "home"

[calendar]
# Calendar names can be a single quoted string or a list of quoted strings.
include_calendar_names = ["Calendar"]
exclude_calendar_names = []
include_all_day = false
window_min_minutes = 10
window_max_minutes = 45
lookback_days_for_init = 14

[llm]
provider = "copilot"
# Leave command blank to use the provider default executable.
command = ""
# Model names are provider-specific; copilot uses dot notation such as claude-sonnet-4.6.
model = "claude-sonnet-4.6"
effort = "high"
timeout_seconds = 600
retry_attempts = 3
temperature = 0.2
max_output_tokens = 4096
prompt_template = "pre_meeting_summary.md"
note_template = "meeting_note.md"

[execution]
max_parallel_sources = 4
source_timeout_seconds = 120

[output]
meeting_notes_placeholder = "- "

[slack]
history_days = 7
request_timeout_seconds = 30
max_messages = 500
page_size = 200
max_characters = 20000

[notion]
version = "2022-06-28"
request_timeout_seconds = 30
max_characters = 20000

[files]
max_characters = 20000

[email]
history_days = 7
max_messages = 20
max_characters = 20000
request_timeout_seconds = 120

[logging]
level = "INFO"
history_file = "history.log"
last_run_file = "last-run.log"
debug_prompts = false
debug_llm_output = false
