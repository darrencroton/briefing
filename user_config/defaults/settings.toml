[paths]
vault_root = "~/Library/Mobile Documents/iCloud~md~obsidian/Documents/Vault"
meeting_notes_dir = "Internal/Meetings"
log_dir = "logs"
state_dir = "state"
prompt_dir = "user_config/prompts"
template_dir = "user_config/templates"
series_dir = "user_config/series"
debug_dir = "tmp"
env_file = "~/.env.briefing"

[meeting_intelligence]
sessions_root = "sessions"
noted_command = "noted"
pre_roll_seconds = 90
reschedule_tolerance_seconds = 300
watch_poll_seconds = 30
watch_lookahead_minutes = 180
# Optional multi-Mac routing. When default_location_type is set, only a Mac whose
# local_location_type (or host-name mapping below) matches the meeting location_type
# will plan and launch the recording.
# default_location_type = "office"
# local_location_type = "office"
default_host_name = "Meeting host"
default_language = "en-AU"
default_asr_backend = "whisperkit"
default_diarization_enabled = true
default_mode = "in_person"
# Leave blank/omitted to use paths.meeting_notes_dir for one-off noted config events.
# one_off_note_dir = "~/Notes/Meetings"
auto_start = true
auto_stop = true
default_extension_minutes = 10
max_single_extension_minutes = 15
pre_end_prompt_minutes = 5
no_interaction_grace_minutes = 5

# Optional shared-config host mapping. briefing checks macOS HostName,
# LocalHostName, ComputerName, then Python host-name fallbacks.
# [meeting_intelligence.location_type_by_host]
# "Office-Mac" = "office"
# "Home-Mac" = "home"

[calendar]
include_all_day = false
window_min_minutes = 10
window_max_minutes = 45
# Calendar names can be a single quoted string or a list of quoted strings.
include_calendar_names = ["Calendar"]
exclude_calendar_names = []
lookback_days_for_init = 14

[execution]
max_parallel_sources = 4
source_timeout_seconds = 120

[output]
meeting_notes_placeholder = "- "

[llm]
provider = "copilot"
# Optional executable override. Leave blank to use the provider default.
command = ""
# Model name format is provider-specific. copilot uses dot notation (claude-sonnet-4.6).
# The claude CLI uses dash notation (e.g. claude-sonnet-4-5). Update when switching providers.
model = "claude-sonnet-4.6"
effort = "high"
timeout_seconds = 600
retry_attempts = 3
temperature = 0.2
max_output_tokens = 4096
prompt_template = "pre_meeting_summary.md"
note_template = "meeting_note.md"

[slack]
history_days = 7
request_timeout_seconds = 30
max_messages = 500
page_size = 200
max_characters = 20000

[notion]
version = "2022-06-28"
request_timeout_seconds = 30
max_characters = 20000

[files]
max_characters = 20000

[email]
history_days = 7
max_messages = 20
max_characters = 20000
request_timeout_seconds = 30

[logging]
level = "INFO"
history_file = "history.log"
last_run_file = "last-run.log"
debug_prompts = false
debug_llm_output = false
